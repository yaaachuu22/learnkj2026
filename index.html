<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YaaChuu 語言學習計劃</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0ede8;--muted:#7a7875;
  --accent-kr:#e8825a;--accent-jp:#7ab8f5;
  --accent-kr-dim:rgba(232,130,90,0.12);--accent-jp-dim:rgba(122,184,245,0.12);
  --green:#6fcf97;--green-dim:rgba(111,207,151,0.1);
  --amber:#f0c060;--amber-dim:rgba(240,192,96,0.1);
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;overflow-y:auto}
.logo-wrap{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:14px}
.logo-text{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);line-height:1.2}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.lang-switch{display:flex;margin:0 16px 14px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;gap:2px}
.lang-btn{flex:1;padding:6px;border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.lang-btn.kr.active{background:var(--accent-kr);color:#1a0e08;font-weight:500}
.lang-btn.jp.active{background:var(--accent-jp);color:#071525;font-weight:500}
.streak-box{margin:0 16px 14px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px}
.streak-fire{font-size:20px}
.streak-num{font-size:22px;font-weight:500;color:var(--amber);line-height:1}
.streak-label{font-size:10px;color:var(--muted);line-height:1.4}
.nav-section{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;padding:10px 20px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;text-align:left;width:100%;transition:all .15s;border-left:2px solid transparent;letter-spacing:.02em}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--text);border-left-color:var(--accent)}
.nav-item.active .nav-dot{background:var(--accent)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid var(--border)}
.level-badge{font-size:10px;color:var(--muted);background:var(--surface2);border-radius:99px;padding:4px 10px;display:inline-block}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;min-height:100%}
.page.active{display:flex}
.page-header{padding:26px 36px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.page-title{font-family:'DM Serif Display',serif;font-size:26px;font-style:italic}
.page-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.06em}

/* TODAY */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:24px 36px}
@media(max-width:800px){.today-grid{grid-template-columns:1fr}}
.today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;animation:fadeIn .35s ease}
.today-card.full{grid-column:1/-1}
.tc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tc-title{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.tc-badge{font-size:10px;padding:3px 8px;border-radius:99px;background:var(--accent-dim);color:var(--accent)}
.wod-char{font-size:54px;line-height:1;margin-bottom:8px;cursor:pointer;text-align:center;display:block;transition:opacity .15s}
.wod-char:hover{opacity:.7}
.wod-roman{font-size:12px;color:var(--muted);letter-spacing:.06em;text-align:center;margin-bottom:4px}
.wod-trans{font-size:17px;color:var(--text);text-align:center;margin-bottom:10px}
.wod-example{font-size:12px;color:var(--muted);line-height:1.6;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:8px}
.wod-example:hover{opacity:.8}
.wod-tip{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px}
.play-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:99px;font-size:11px;cursor:pointer;background:var(--accent-dim);color:var(--accent);border:1px solid var(--border2);margin-top:2px;transition:all .15s}
.play-pill:hover{background:var(--accent);color:#fff}
.phrase-mini{padding:9px 0;border-bottom:1px solid var(--border)}
.phrase-mini:last-child{border-bottom:none}
.phrase-mini-native{font-size:14px;margin-bottom:2px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.phrase-mini-native:hover{opacity:.75}
.phrase-mini-roman{font-size:10px;color:var(--muted);margin-bottom:1px}
.phrase-mini-trans{font-size:11px;color:var(--muted)}
.week-dots{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.week-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:flex-start;flex-direction:column;justify-content:center;font-size:9px;border:1px solid var(--border2);color:var(--muted);gap:1px}
.week-dot.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.week-dot.today-dot{border-color:var(--accent);color:var(--accent);font-weight:500}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.progress-lbl{font-size:11px;color:var(--muted);width:40px;flex-shrink:0}
.progress-track{flex:1;height:5px;background:var(--border2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .6s ease}
.progress-pct{font-size:11px;color:var(--muted);width:30px;text-align:right}
.challenge-prompt{font-size:13px;color:var(--text);line-height:1.6;padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);border-left:2px solid var(--accent);margin-bottom:8px}
.challenge-hint{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.challenge-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s}
.challenge-input:focus{border-color:var(--accent)}
.challenge-input::placeholder{color:var(--muted)}
.challenge-btn{padding:8px 16px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:var(--bg);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:opacity .15s}
.challenge-btn:hover{opacity:.85}
.challenge-result{display:none;margin-top:10px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;line-height:1.6}
.result-good{background:var(--green-dim);border:1px solid rgba(111,207,151,.2);color:var(--green)}
.result-ok{background:var(--amber-dim);border:1px solid rgba(240,192,96,.2);color:var(--amber)}
.done-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;margin-top:10px;transition:all .15s;width:100%;text-align:center}
.done-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.done-btn.completed{background:var(--green-dim);color:var(--green);border-color:rgba(111,207,151,.3)}

/* ALPHABET */
.alpha-content{overflow-y:auto;flex:1}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;padding:16px 36px}
.alpha-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.alpha-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px)}
.alpha-card.playing{border-color:var(--accent);background:var(--accent-dim)}
.alpha-char{font-size:28px;line-height:1;margin-bottom:5px}
.alpha-roman{font-size:11px;color:var(--muted);letter-spacing:.05em}
.alpha-hint{font-size:10px;color:var(--muted);margin-top:2px;opacity:.7}
.sec-div{padding:8px 36px 2px;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* PHRASES */
.scenario-tabs{display:flex;gap:6px;padding:14px 36px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.s-tab{padding:6px 14px;border:1px solid var(--border2);border-radius:99px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;transition:all .15s}
.s-tab:hover{color:var(--text)}
.s-tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.phrases-list{padding:18px 36px;flex:1;overflow-y:auto}
.phrase-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .15s}
.phrase-row:hover{border-color:var(--border2);background:var(--surface2)}
.phrase-row.playing{border-color:var(--accent);background:var(--accent-dim)}
.phrase-main{flex:1}
.phrase-native{font-size:16px;margin-bottom:3px}
.phrase-roman{font-size:11px;color:var(--muted);margin-bottom:2px}
.phrase-trans{font-size:12px;color:var(--muted)}
.play-circle{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--accent-dim);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);transition:all .15s}
.phrase-row:hover .play-circle{background:var(--accent);color:#fff;border-color:var(--accent)}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-config{padding:12px 36px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.config-label{font-size:11px;color:var(--muted)}
.config-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:99px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;transition:all .15s}
.config-btn:hover{color:var(--text)}
.config-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.chat-messages{flex:1;overflow-y:auto;padding:22px 36px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:78%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--surface2);border:1px solid var(--border)}
.msg.ai .msg-avatar{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;line-height:1.6}
.msg.user .msg-bubble{background:var(--surface2);border-color:var(--border2)}
.msg-native{font-size:16px;margin-bottom:4px}
.msg-roman{font-size:11px;color:var(--muted);margin-bottom:4px}
.msg-trans{font-size:12px;color:var(--muted)}
.msg-play{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 10px;background:var(--accent-dim);border:1px solid var(--border2);border-radius:99px;font-size:11px;color:var(--accent);cursor:pointer;transition:all .15s}
.msg-play:hover{background:var(--accent);color:#fff}
.msg-tip{margin-top:8px;padding:8px 12px;background:var(--green-dim);border:1px solid rgba(111,207,151,.2);border-radius:8px;font-size:12px;color:var(--green);line-height:1.5}
.chat-input-area{padding:12px 36px 20px;border-top:1px solid var(--border);flex-shrink:0}
.chat-hint{font-size:11px;color:var(--muted);margin-bottom:9px;padding:7px 12px;background:var(--surface2);border-radius:var(--radius-sm);border-left:2px solid var(--accent)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;resize:none;outline:none;transition:border-color .15s;min-height:48px;max-height:120px}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--muted)}
.send-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{opacity:.85;transform:scale(1.05)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.voice-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.voice-btn.listening{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);animation:pulse 1.2s infinite}
.chat-intro{text-align:center;padding:36px 20px;color:var(--muted);margin:auto}
.chat-intro-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:10px;font-style:italic}
.chat-intro-sub{font-size:13px;line-height:1.7;max-width:380px;margin:0 auto 20px}
.starter-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.starter-btn{padding:8px 16px;border:1px solid var(--border2);border-radius:99px;font-size:12px;cursor:pointer;background:transparent;color:var(--text);font-family:'DM Mono',monospace;transition:all .15s}
.starter-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
.loading-bar{height:2px;background:var(--border);position:fixed;top:0;left:0;right:0;z-index:999;display:none}
.loading-bar.active{display:block}
.loading-bar::after{content:'';display:block;height:100%;background:var(--accent);animation:load 1.5s ease infinite}
.kr{--accent:var(--accent-kr);--accent-dim:var(--accent-kr-dim)}
.jp{--accent:var(--accent-jp);--accent-dim:var(--accent-jp-dim)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes load{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="kr">
<div class="loading-bar" id="loadingBar"></div>
<div class="app">
  <div class="sidebar">
    <div class="logo-wrap">
      <div class="logo-text">YaaChuu<br>語言學習計劃</div>
      <div class="logo-sub">for music people</div>
    </div>
    <div class="lang-switch">
      <button class="lang-btn kr active" onclick="setLang('kr')">🇰🇷 한국어</button>
      <button class="lang-btn jp" onclick="setLang('jp')">🇯🇵 日本語</button>
    </div>
    <div class="streak-box">
      <div class="streak-fire">🔥</div>
      <div>
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">天連續學習</div>
      </div>
    </div>
    <div class="nav-section">學習</div>
    <button class="nav-item active" onclick="showPage('today',this)"><span class="nav-dot"></span>今日課程</button>
    <button class="nav-item" onclick="showPage('alphabet',this)"><span class="nav-dot"></span>字母發音</button>
    <button class="nav-item" onclick="showPage('phrases',this)"><span class="nav-dot"></span>情境句型</button>
    <div class="nav-section">練習</div>
    <button class="nav-item" onclick="showPage('chat',this)"><span class="nav-dot"></span>AI 對話練習</button>
    <div class="sidebar-footer">
      <div style="font-size:9px;color:var(--muted);letter-spacing:.08em;margin-bottom:4px">學習階段</div>
      <div class="level-badge" id="levelBadge">第 1 階段 · 入門</div>
    </div>
  </div>

  <div class="main">
    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div class="page-header">
        <div class="page-title" id="todayTitle">今日課程</div>
        <div class="page-sub" id="todayDate"></div>
      </div>
      <div class="today-grid" id="todayGrid"></div>
    </div>

    <!-- ALPHABET -->
    <div class="page" id="page-alphabet">
      <div class="page-header">
        <div class="page-title" id="alphaTitle">韓文字母</div>
        <div class="page-sub">點擊字母聆聽發音 · 附英文拼音輔助</div>
      </div>
      <div class="alpha-content" id="alphaContent"></div>
    </div>

    <!-- PHRASES -->
    <div class="page" id="page-phrases">
      <div class="page-header">
        <div class="page-title">情境句型</div>
        <div class="page-sub">點擊句子聆聽發音 · 按場景分類</div>
      </div>
      <div class="scenario-tabs" id="scenarioTabs"></div>
      <div class="phrases-list" id="phrasesList"></div>
    </div>

    <!-- CHAT -->
    <div class="page" id="page-chat">
      <div class="page-header">
        <div class="page-title">AI 對話練習</div>
        <div class="page-sub">選場景開口練習 · 即時發音 + 學習提示</div>
      </div>
      <div class="chat-wrap">
        <div class="chat-config" id="chatConfig"></div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-intro">
            <div class="chat-intro-title">準備好了嗎？</div>
            <div class="chat-intro-sub">選一個情境，輸入你想說的話。AI 會用正確發音回覆並解析句子。</div>
            <div class="starter-btns" id="starterBtns"></div>
          </div>
        </div>
        <div class="chat-input-area">
          <div class="chat-hint" id="chatHint">選一個情境開始對話 ↑</div>
          <div class="input-row">
            <textarea class="chat-input" id="chatInput" placeholder="輸入你想說的話..." rows="1" onkeydown="handleEnter(event)"></textarea>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://api.anthropic.com/v1/messages";
let lang = 'kr', chatHistory = [], isListening = false, rec = null, activeChat = null;

// ── DAILY POOLS ──────────────────────────────────────────────────────
const WOD_KR = [
  {c:'안녕',r:'an-nyeong',t:'你好（輕鬆）',ex:'안녕! 오랜만이야 — 嘿！好久不見',tip:'音樂節場合常用，比 안녕하세요 更輕鬆'},
  {c:'음악',r:'eu-mak',t:'音樂',ex:'음악 좋아해요? — 你喜歡音樂嗎？',tip:'打開所有話題的魔法詞'},
  {c:'공연',r:'gong-yeon',t:'演出',ex:'공연 어땠어요? — 演出怎麼樣？',tip:'音樂節最常聽到的詞之一'},

// ── STORAGE ──────────────────────────────────────────────
function gs(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dayIdx(){return Math.floor((Date.now()-new Date('2025-01-01').getTime())/86400000);}

function updateStreak(){
  const today=todayStr();
  let {streak=0,lastDate=''}=gs('streak_data',{});
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(lastDate!==today){streak=(lastDate===yesterday)?streak+1:1;ss('streak_data',{streak,lastDate:today});}
  document.getElementById('streakNum').textContent=streak;
}

// ── TODAY PAGE ──────────────────────────────────────────
function renderToday(){
  const di=dayIdx();
  const wods=lang==='kr'?WOD_KR:WOD_JP;
  const phrases=lang==='kr'?PHRASES_KR:PHRASES_JP;
  const chas=lang==='kr'?CHA_KR:CHA_JP;
  const wod=wods[di%wods.length];
  const tp=[0,1,2].map(i=>phrases[(di*3+i)%phrases.length]);
  const ch=chas[di%chas.length];
  const now=new Date();
  const wd=['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} 週${wd[now.getDay()]} · ${lang==='kr'?'韓文':'日文'}今日課程`;
  const done=gs('done_days',[]);
  const total=done.length;
  const phase=total<30?1:total<90?2:total<180?3:4;
  document.getElementById('levelBadge').textContent=`第${phase}階段·${['','入門','初級','中級','中高級'][phase]}`;
  const acc=lang==='kr'?'var(--accent-kr)':'var(--accent-jp)';
  const todayDone=done.includes(todayStr());
  let dots='';
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const ds=d.toISOString().slice(0,10);
    const cls=done.includes(ds)?'done':(i===0?'today-dot':'');
    dots+=`<div class="week-dot ${cls}"><span style="font-size:9px">${wd[d.getDay()]}</span><span>${done.includes(ds)?'✓':i===0?'●':'·'}</span></div>`;
  }
  const langCode=lang==='kr'?'ko-KR':'ja-JP';
  const wEx=wod.ex.split('—')[0].trim();

  document.getElementById('todayGrid').innerHTML=`
    <div class="today-card">
      <div class="tc-header">
        <span class="tc-title">今日單字</span>
        <span class="tc-badge">Day ${(di%wods.length)+1} / ${wods.length}</span>
      </div>
      <div style="text-align:center">
        <span class="wod-char" onclick="speak('${esc(wod.c)}','${langCode}')">${wod.c}</span>
        <div class="wod-roman">${wod.r}</div>
        <div class="wod-trans">${wod.t}</div>
        <div class="wod-example" onclick="speak('${esc(wEx)}','${langCode}')">${wod.ex}</div>
        <span class="play-pill" onclick="speak('${esc(wod.c)}','${langCode}')">▶ 聽發音</span>
        <div class="wod-tip">💡 ${wod.tip}</div>
      </div>
    </div>

    <div class="today-card">
      <div class="tc-header">
        <span class="tc-title">今日句型 × 3</span>
        <span class="tc-badge">每日更新</span>
      </div>
      ${tp.map(p=>`<div class="phrase-mini">
        <div class="phrase-mini-native" onclick="speak('${esc(p[0])}','${langCode}')">${p[0]} <span style="font-size:10px;opacity:.5">▶</span></div>
        <div class="phrase-mini-roman">${p[1]}</div>
        <div class="phrase-mini-trans">${p[2]}</div>
      </div>`).join('')}
    </div>

    <div class="today-card">
      <div class="tc-header">
        <span class="tc-title">今日挑戰</span>
        <span class="tc-badge">說出來試試</span>
      </div>
      <div class="challenge-prompt">${ch.p}</div>
      <div class="challenge-hint">💡 提示：${ch.h}</div>
      <input class="challenge-input" id="ci" placeholder="輸入你的答案..." onkeydown="if(event.key==='Enter')checkCha()"/>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="challenge-btn" onclick="checkCha()">確認答案</button>
        <span class="play-pill" onclick="speak('${esc(ch.a)}','${langCode}')">▶ 聽正確發音</span>
      </div>
      <div class="challenge-result" id="cr"></div>
    </div>

    <div class="today-card">
      <div class="tc-header">
        <span class="tc-title">本週進度</span>
        <span class="tc-badge">累計 ${total} 天</span>
      </div>
      <div class="week-dots">${dots}</div>
      <div style="margin-top:14px">
        ${[['聽',Math.min(100,total*2)],['說',Math.min(100,total*1.5)],['讀',Math.min(100,total)]].map(([l,p])=>`
          <div class="progress-row">
            <div class="progress-lbl">${l}</div>
            <div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${acc}"></div></div>

          </div>`).join('')}

      <div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6">

      </div>
      <button class="done-btn ${todayDone?'completed':''}" onclick="markDone()">${todayDone?'✓ 今日已完成':'✓ 完成今日課程'}</button>
    </div>
  `;
}

function markDone(){
  const today=todayStr();const done=gs('done_days',[]);
  if(!done.includes(today)){done.push(today);ss('done_days',done);}
  updateStreak();renderToday();
}

function checkCha(){
  const di=dayIdx();const pool=lang==='kr'?CHA_KR:CHA_JP;const ch=pool[di%pool.length];
  const input=document.getElementById('ci').value.trim();if(!input)return;
  const strip=s=>s.replace(/[。！？.!? ]/g,'').trim();
  const isGood=strip(input)===strip(ch.a);
  const isClose=!isGood&&(strip(input).slice(0,4)===strip(ch.a).slice(0,4));
  const cr=document.getElementById('cr');cr.style.display='block';
  cr.className='challenge-result '+(isGood?'result-good':'result-ok');
  cr.innerHTML=isGood?`✓ 完全正確！<br><strong>${ch.a}</strong>`:
    `${isClose?'↗ 很接近！':'△ 再試試：'}<strong>${ch.a}</strong><br><span style="font-size:11px;opacity:.8">提示：${ch.h}</span>`;
  speak(ch.a,lang==='kr'?'ko-KR':'ja-JP');
}

function renderAlphabet(){
  const d=ALPHA[lang];
  document.getElementById('alphaTitle').textContent=d.title;
  const lc=lang==='kr'?'ko-KR':'ja-JP';
  document.getElementById('alphaContent').innerHTML=d.groups.map(g=>`
    <div class="sec-div">${g.g}</div>
    <div class="alpha-grid">${g.cs.map(c=>`
      <div class="alpha-card" onclick="speakChar('${esc(c.c)}','${lc}',this)">
        <div class="alpha-char">${c.c}</div>
        <div class="alpha-roman">${c.r||''}</div>
        ${c.h?`<div class="alpha-hint">${c.h}</div>`:''}
      </div>`).join('')}</div>`).join('');
}

function speakChar(c,lc,el){
  document.querySelectorAll('.alpha-card.playing').forEach(x=>x.classList.remove('playing'));
  el.classList.add('playing');
  speak(c,lc,()=>el.classList.remove('playing'));
}

function renderScenarioTabs(){
  const sc=SCENARIOS[lang];
  document.getElementById('scenarioTabs').innerHTML=sc.map((s,i)=>
    `<button class="s-tab ${i===0?'active':''}" onclick="selectSc('${s.id}',this)">${s.label}</button>`).join('');
  selectSc(sc[0].id,null);
}

function selectSc(id,el){
  if(el){document.querySelectorAll('.s-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
  const s=SCENARIOS[lang].find(s=>s.id===id);if(!s)return;
  const lc=lang==='kr'?'ko-KR':'ja-JP';
  document.getElementById('phrasesList').innerHTML=s.phrases.map(p=>`
    <div class="phrase-row" onclick="speakPhrase('${esc(p.n)}','${lc}',this)">
      <div class="phrase-main">
        <div class="phrase-native">${p.n}</div>
        <div class="phrase-roman">${p.r}</div>
        <div class="phrase-trans">${p.t}</div>
      </div>
      <div class="play-circle">▶</div>
    </div>`).join('');
}

function speakPhrase(t,lc,el){
  document.querySelectorAll('.phrase-row.playing').forEach(r=>r.classList.remove('playing'));
  el.classList.add('playing');speak(t,lc,()=>el.classList.remove('playing'));
}

// ── CHAT ─────────────────────────────────────────────────
function renderChatConfig(){
  const sc=CHAT_SCENARIOS[lang];
  document.getElementById('chatConfig').innerHTML='<span class="config-label">場景：</span>'+
    sc.map((s,i)=>`<button class="config-btn ${i===0?'active':''}" onclick="selectChat('${s.id}',this)">${s.label}</button>`).join('');
  selectChat(sc[0].id,null,true);
}

function selectChat(id,el,silent){
  if(el){document.querySelectorAll('.config-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
  activeChat=CHAT_SCENARIOS[lang].find(s=>s.id===id);
  if(activeChat)document.getElementById('chatHint').textContent='📍 '+activeChat.hint;
  if(!silent){chatHistory=[];renderChatIntro();}
}

function renderChatIntro(){
  const starters=lang==='kr'
    ?['안녕하세요! 처음 뵙겠습니다','어떤 음악 좋아해요?','요즘 어떻게 지내요?','같이 밥 먹을래요?']
    :['はじめまして！','どんな音楽が好きですか？','最近どうですか？','一緒にご飯食べませんか？'];
  document.getElementById('chatMessages').innerHTML=`<div class="chat-intro">
    <div class="chat-intro-title">準備好了嗎？</div>
    <div class="chat-intro-sub">選一個情境，輸入你想說的話。AI 會用正確發音回覆並解析句子。</div>
    <div class="starter-btns">${starters.map(s=>`<button class="starter-btn" onclick="useStarter('${esc(s)}')">${s}</button>`).join('')}</div>
  </div>`;
}

function useStarter(t){document.getElementById('chatInput').value=t;sendMessage();}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

async function sendMessage(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();if(!text||!activeChat)return;
  inp.value='';inp.style.height='';
  document.getElementById('chatMessages').querySelector('.chat-intro')?.remove();
  const msgs=document.getElementById('chatMessages');
  msgs.innerHTML+=`<div class="msg user"><div class="msg-avatar">你</div><div class="msg-bubble"><div style="font-size:15px">${text}</div></div></div>`;
  msgs.innerHTML+=`<div class="msg ai" id="typ"><div class="msg-avatar">AI</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('loadingBar').classList.add('active');
  chatHistory.push({role:'user',content:text});
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,system:activeChat.sys,messages:chatHistory
    })});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'（抱歉，發生錯誤）';
    document.getElementById('typ')?.remove();
    const lines=reply.split('\n').filter(l=>l.trim());
    let native='',roman='',trans='',tip='';
    lines.forEach(l=>{
      if(l.startsWith('[')&&l.endsWith(']'))roman=l.slice(1,-1);
      else if(l.startsWith('（')&&l.endsWith('）'))trans=l.slice(1,-1);
      else if(l.startsWith('💡'))tip=l;
      else if(!native&&!l.startsWith('💡'))native=l;
    });
    const st=native||reply;
    msgs.innerHTML+=`<div class="msg ai"><div class="msg-avatar">AI</div><div class="msg-bubble">
      ${native?`<div class="msg-native">${native}</div>`:`<div style="font-size:14px;line-height:1.6">${reply}</div>`}
      ${roman?`<div class="msg-roman">[${roman}]</div>`:''}
      ${trans?`<div class="msg-trans">（${trans}）</div>`:''}
      <span class="msg-play" onclick="speakAI('${esc(st)}',this)">▶ 聽發音</span>
      ${tip?`<div class="msg-tip">${tip}</div>`:''}
    </div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
    speak(st);
    chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    document.getElementById('typ')?.remove();
    msgs.innerHTML+=`<div class="msg ai"><div class="msg-avatar">AI</div><div class="msg-bubble">（連線錯誤，請再試一次）</div></div>`;
  }
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('loadingBar').classList.remove('active');
  msgs.scrollTop=msgs.scrollHeight;
}

function speakAI(t,el){const o=el.textContent;el.textContent='▶ 播放中...';speak(t,lang==='kr'?'ko-KR':'ja-JP',()=>el.textContent=o);}
function handleEnter(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

// ── TTS ──────────────────────────────────────────────────
function speak(text,lc,onEnd){
  if(!window.speechSynthesis){if(onEnd)onEnd();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lc||(lang==='kr'?'ko-KR':'ja-JP');u.rate=0.85;u.pitch=1;
  const v=window.speechSynthesis.getVoices().find(v=>v.lang===u.lang||v.lang.startsWith(u.lang.split('-')[0]));
  if(v)u.voice=v;u.onend=onEnd||null;
  window.speechSynthesis.speak(u);
}

// ── VOICE INPUT ───────────────────────────────────────────
function toggleVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){alert('請使用 Chrome 瀏覽器以支援語音輸入');return;}
  if(isListening){rec.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.lang=lang==='kr'?'ko-KR':'ja-JP';rec.interimResults=false;
  rec.onstart=()=>{isListening=true;document.getElementById('voiceBtn').classList.add('listening');};
  rec.onresult=e=>{document.getElementById('chatInput').value=e.results[0][0].transcript;};
  rec.onend=()=>{isListening=false;document.getElementById('voiceBtn').classList.remove('listening');};
  rec.start();
}

// ── NAVIGATION ────────────────────────────────────────────
function setLang(l){
  lang=l;document.body.className=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.lang-btn.'+l).classList.add('active');
  chatHistory=[];
  renderToday();renderAlphabet();renderScenarioTabs();renderChatConfig();
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const ta=document.getElementById('chatInput');
  ta.addEventListener('input',()=>{ta.style.height='';ta.style.height=ta.scrollHeight+'px';});
  window.speechSynthesis?.getVoices?.();
  updateStreak();
  renderToday();renderAlphabet();renderScenarioTabs();renderChatConfig();
});
</script>
